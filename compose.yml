services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PostgreSQL 18+ usa PGDATA=/var/lib/postgresql/18/docker.
      # Se monta el directorio padre para persistencia y futuras actualizaciones.
      - mindflow_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: ${PORT:-3001}
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001/api/v1}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_DEBUG: ${AUTH_DEBUG:-false}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  mindflow_pgdata:
    name: mindflow_pgdata

networks:
  internal:
    internal: true
